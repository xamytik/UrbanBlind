<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanBlind — Безопасность города</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

body {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

/* Размытая карта на фоне */
#background-map {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    filter: blur(1.2) brightness(1.1);
    opacity: 0.3;
}

/* Затемнение поверх карты */
.map-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.3);
    z-index: 2;
}

/* Контейнер контента */
.container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 40px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(44, 62, 80, 0.15);
    max-width: 600px;
    width: 90%;
}

.logo {
    font-size: 48px;
    font-weight: 900;
    color: #2c3e50;
    margin-bottom: 20px;
    letter-spacing: -1px;
}

.slogan {
    font-size: 18px;
    color: #2c3e50;
    margin-bottom: 40px;
    font-weight: 500;
    line-height: 1.5;
}

.btn-start {
    display: inline-block;
    padding: 18px 50px;
    font-size: 18px;
    font-weight: 700;
    color: white;
    background-color: #2c3e50;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
}

.btn-start:hover {
    background-color: #34495e;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(44, 62, 80, 0.3);
}

.btn-start:active {
    transform: translateY(-1px);
}

@media (max-width: 600px) {
    .logo { font-size: 36px; }
    .slogan { font-size: 16px; }
    .btn-start { padding: 16px 40px; font-size: 16px; }
    .container { padding: 40px 25px; }
}
</style>
</head>
<body>
    <!-- Размытая карта на фоне -->
    <div id="background-map"></div>
    <div class="map-overlay"></div>

    <!-- Контент -->
    <div class="container">
        <h1 class="logo">UrbanBlind</h1>
        <p class="slogan">Ваша безопасность — наш приоритет в каждом маршруте.</p>
        <a href="app.html" class="btn-start">Оценить риски</a>
    </div>

    <!-- Подключение Яндекс Карт -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=c2763cd1-5a14-4131-842c-2bbd60932c52&lang=ru_RU" type="text/javascript"></script>
    <script>
        // Инициализация фоновой карты
        ymaps.ready(init);

        function init() {
            const map = new ymaps.Map('background-map', {
                center: [55.7961, 49.1064], // Казань
                zoom: 12,
                controls: [] // Убираем элементы управления
            });

            // Отключаем взаимодействие с фоновой картой
            map.behaviors.disable('scrollZoom');
            map.behaviors.disable('drag');
            map.behaviors.disable('dblClick');
        }
    </script>
</body>
</html>
